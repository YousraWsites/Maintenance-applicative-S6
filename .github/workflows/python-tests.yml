name: Python tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 app.py app_functions.py test_app.py

      - name: Check formatting with black
        run: black --check app.py app_functions.py test_app.py

      - name: Run unit tests
        run: pytest test_app.py -v
